version: "3.1"
  
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - fechas_horarios_teoria
  - fechas_horarios_practica
  - lunes
  - martes
  - miercoles
  - jueves
  - viernes
  - teoria
  - practica
  - fechas_tp
  - gracias
  - profesorado
  - tema1
  - tema2
  - tema3
  - tema4
  - tema5
  - repasar
  - set_resultado_defs
  - cuestionarios
  - conceptos
  - ejercicios
  - capa_aplicacion
  - capa_presentacion
  - capa_sesion
  - capa_transporte
  - capa_red
  - correos_profesor
  - entregas
  - calidad_servicio
  - congestion
  - enrutamiento
  - conmutacion
  - dijkstra
  - ejercicioDijsktra
  - FalloejercicioDijsktrab
  - FalloejercicioDijsktrac
  - encaminamiento
  - ejercicioEncaminamiento
  - FalloejercicioEncaminamientoa
  - FalloejercicioEncaminamientoc
  - FalloejercicioRutaa
  - ejercicioRuta
  - FalloejercicioRutab
  - ruta
  - noticia
  - seleccionar_tema

entities:
  - tema_actual

slots:
  tema_actual:
    type: text
    influence_conversation: false
    mappings:
    - type: from_entity
      entity: tema_actual

  pregunta_actual_idx:
    type: any
    influence_conversation: false
    initial_value: 0
    mappings:
    - type: custom
  respuesta_generica:
    type: text
    influence_conversation: false
    mappings:
    - type: from_text
      not_intent:
        - cuestionarios
        - tema1
      conditions:
      - active_loop: cuestionario_dinamico_form

forms:
  cuestionario_dinamico_form:
    required_slots:
      - respuesta_generica

actions:
  - validate_cuestionario_dinamico_form
  - action_ask_respuesta_generica
  - action_reset_cuestionario_dinamico
  - action_listar_temas

responses:
